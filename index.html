<!DOCTYPE html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JRPG menu</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <header>

      </header>

      <section id="form_preferencias" class="form_pre">
        <div class="panel">
          <p class="panel-titles">Preferences<p>
          <form class="pref-form" id="form_pref">
            <div>
              <label for="theme">theme</label>
              <select id="theme" name="theme">
                <option value="dark" selected>dark</option>
                <option value="light">light</option>
              </select>
            </div>
            <div>
              <label for="fontRange">Mida font</label>
              <input id="fontRange" type="range" min="13" max="36" step="1" />
              <span id="fontValue"></span>
            </div>
            <div>
              <label for="reduce">Reduce motions</label>
              <input id="reduce" name="reduce" type="checkbox">
            </div>
            <button id="form_btn">Save preferences</button>
          </form>
        </div>
      </section>

      <section id="loading" class="load">
        <div class="panel">
          <p id="loading_msg"></p>
          <img src="./public/blendertimer-load-38_256.gif">
        </div>
      </section>

      <section id="menu" class="inventory-section" hidden>
        <div class="inventory-header">
          <h2>Inventario</h2>
          <div class="inventory-controls">
            <input type="text" id="searchInput" placeholder="Buscar por nombre..." />
            <select id="categoryFilter">
              <option value="todos">Todos</option>
              <option value="consumible">Consumibles</option>
              <option value="arma">Armas</option>
              <option value="armadura">Armaduras</option>
              <option value="material">Materiales</option>
            </select>
          </div>
        </div>
        <div class="inventory-grid" id="inventoryGrid">
          <!-- Items renderizados por JS se inyectarán aquí -->
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
